<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hammer the Rose 🌹</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        body { margin:0; padding:0; background:#0a1f0a; display:flex; justify-content:center; align-items:center; min-height:100vh; font-family:'Press Start 2P',cursive; color:white; overflow:hidden; }
        #game-container { position:relative; box-shadow:0 0 50px #c00; }
        canvas { display:block; image-rendering:pixelated; }
        #ui { position:absolute; top:15px; left:20px; right:20px; display:flex; justify-content:space-between; z-index:10; pointer-events:none; }
        .score { font-size:22px; text-shadow:0 0 12px #ff1493; }
        #start-screen, #game-over-screen, #pause-screen { position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.92); display:flex; flex-direction:column; justify-content:center; align-items:center; z-index:100; text-align:center; }
        h1 { font-size:52px; color:#c00; text-shadow:0 0 30px #f66; }
        button { padding:16px 50px; font-size:24px; background:#c00; color:white; border:4px solid white; cursor:pointer; margin:10px; }
        button:hover { background:#f66; transform:scale(1.1); }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="game" width="800" height="600"></canvas>
        
        <div id="ui">
            <div class="score" id="score-display">SCORE: 00000</div>
            <div class="score" id="combo-display"></div>
            <div class="score" id="level-display">LVL 1</div>
            <div class="score" id="lives-display">❤️❤️❤️</div>
        </div>

        <div id="start-screen">
            <h1>HAMMER THE ROSE</h1>
            <p style="font-size:36px;margin:10px;">🌹🔨🌹</p>
            <button id="start-btn">START GAME</button>
        </div>

        <div id="pause-screen" style="display:none;">
            <h1>PAUSED</h1>
            <button onclick="togglePause()">RESUME</button>
        </div>

        <div id="game-over-screen" style="display:none;">
            <h1>GAME OVER</h1>
            <p id="final-score" style="font-size:26px;margin:20px 0;"></p>
            <button id="restart-btn">PLAY AGAIN</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        
        let playerX = 360;
        let roses = [], thorns = [], particles = [];
        let score = 0, lives = 3, level = 1, combo = 0;
        let gameRunning = false, paused = false, hammerSwing = false, swingTimer = 0;
        let lastSpawn = 0, highScore = localStorage.getItem('htrHS') || 0;
        const keys = {};

        function playSquish() {
            try {
                const audio = new (window.AudioContext || window.webkitAudioContext)();
                const noise = audio.createBufferSource();
                const buffer = audio.createBuffer(1, audio.sampleRate * 0.4, audio.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < buffer.length; i++) data[i] = Math.random() * 2 - 1;
                noise.buffer = buffer;
                const filter = audio.createBiquadFilter();
                filter.type = 'lowpass'; filter.frequency.value = 480;
                noise.connect(filter).connect(audio.destination);
                noise.start();
            } catch(e) {}
        }

        function drawBackground() {
            const sky = ctx.createLinearGradient(0,0,0,380);
            sky.addColorStop(0, '#1a2f1a');
            sky.addColorStop(1, '#0f3a20');
            ctx.fillStyle = sky; ctx.fillRect(0, 0, 800, 380);
            
            ctx.fillStyle = '#0a2a0a'; ctx.fillRect(0, 380, 800, 220);
            
            ctx.strokeStyle = '#1a5a1a'; ctx.lineWidth = 4;
            for (let i = 0; i < 800; i += 12) {
                ctx.beginPath();
                ctx.moveTo(i, 600);
                ctx.quadraticCurveTo(i + 9, 415, i + 19, 600);
                ctx.stroke();
            }
        }

        function drawPlayer() {
            ctx.fillStyle = '#4a2a0f'; ctx.fillRect(playerX + 38, 405, 14, 145); // handle
            ctx.fillStyle = '#444'; ctx.fillRect(playerX + 15, 395, 70, 45);     // club head
            ctx.fillStyle = '#c00';
            ctx.fillRect(playerX + 20, 375, 9, 32);
            ctx.fillRect(playerX + 42, 368, 9, 38);
            ctx.fillRect(playerX + 65, 375, 9, 32);
            ctx.font = '62px Arial'; ctx.fillText('🔨', playerX + 8, 475);
        }

        function spawnRose() { roses.push({x: Math.random()*720+40, y:-60, speed:4.8+level*0.5}); }
        function spawnThorn() { thorns.push({x: Math.random()*720+40, y:-60, speed:5.8+level*0.6}); }

        function createParticles(x, y, color, count) {
            for (let i = 0; i < count; i++) {
                particles.push({x, y, vx:(Math.random()-0.5)*12, vy:(Math.random()-0.5)*11-5, life:38, color, size:Math.random()*8+4});
            }
        }

        function updateObjects() {
            for (let i = roses.length-1; i >= 0; i--) {
                roses[i].y += roses[i].speed;
                if (roses[i].y > 410 && roses[i].x > playerX-40 && roses[i].x < playerX+130) {
                    score += 25 * (1 + Math.floor(combo/5));
                    combo++;
                    createParticles(roses[i].x+20, roses[i].y+20, '#ff1493', 22);
                    roses.splice(i,1);
                } else if (roses[i].y > 650) {
                    playSquish();
                    roses.splice(i,1);
                }
            }
            
            for (let i = thorns.length-1; i >= 0; i--) {
                thorns[i].y += thorns[i].speed;
                const t = thorns[i];
                if (hammerSwing && t.y > 370 && t.x > playerX-40 && t.x < playerX+130) {
                    score += 55; combo++;
                    createParticles(t.x+20, t.y+20, '#8B4513', 25);
                    thorns.splice(i,1);
                } else if (t.y > 410 && t.x > playerX-40 && t.x < playerX+130) {
                    lives--; combo = 0;
                    createParticles(t.x+20, t.y+20, '#ff0000', 30);
                    thorns.splice(i,1);
                    if (lives <= 0) endGame();
                } else if (t.y > 650) thorns.splice(i,1);
            }
            
            for (let i = particles.length-1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx; p.y += p.vy; p.vy += 0.35; p.life--; p.size *= 0.95;
                if (p.life <= 0) particles.splice(i,1);
            }
        }

        function drawObjects() {
            ctx.font = '44px Arial';
            for (let r of roses) ctx.fillText('🌹', r.x, r.y + 38);
            
            ctx.font = '38px Arial';
            for (let t of thorns) {
                ctx.fillStyle = '#8B4513';
                ctx.fillText('📍', t.x, t.y + 35);
            }
            
            for (let p of particles) {
                ctx.globalAlpha = p.life / 40;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, p.size, p.size);
            }
            ctx.globalAlpha = 1;
        }

        function gameLoop() {
            if (!gameRunning || paused) return;
            ctx.clearRect(0, 0, 800, 600);
            drawBackground();
            
            if (keys['ArrowLeft'] || keys['a']) playerX -= 9;
            if (keys['ArrowRight'] || keys['d']) playerX += 9;
            playerX = Math.max(10, Math.min(700, playerX));
            
            if (Date.now() - lastSpawn > 620) {
                Math.random() < 0.6 ? spawnRose() : spawnThorn();
                lastSpawn = Date.now();
            }
            if (score > level * 900) level++;
            
            updateObjects();
            drawObjects();
            drawPlayer();
            
            if (hammerSwing) { swingTimer--; if (swingTimer <= 0) hammerSwing = false; }
            
            document.getElementById('score-display').textContent = `SCORE: ${score.toString().padStart(5,'0')}`;
            document.getElementById('combo-display').textContent = combo > 5 ? `COMBO x${Math.floor(combo/4)}` : '';
            document.getElementById('level-display').textContent = `LVL ${level}`;
            document.getElementById('lives-display').innerHTML = '❤️'.repeat(lives);
            
            requestAnimationFrame(gameLoop);
        }

        function startGame() {
            document.getElementById('start-screen').style.display = 'none';
            gameRunning = true; paused = false;
            score = 0; lives = 3; level = 1; combo = 0;
            roses = []; thorns = []; particles = [];
            playerX = 360; lastSpawn = Date.now();
            gameLoop();
        }

        function endGame() {
            gameRunning = false;
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('htrHS', highScore);
            }
            document.getElementById('final-score').innerHTML = `FINAL SCORE: ${score}<br>HIGH SCORE: ${highScore}`;
            document.getElementById('game-over-screen').style.display = 'flex';
        }

        function togglePause() {
            paused = !paused;
            document.getElementById('pause-screen').style.display = paused ? 'flex' : 'none';
            if (!paused) gameLoop();
        }

        // Event Listeners
        document.getElementById('start-btn').addEventListener('click', startGame);
        document.getElementById('restart-btn').addEventListener('click', () => {
            document.getElementById('game-over-screen').style.display = 'none';
            startGame();
        });

        window.addEventListener('keydown', e => {
            keys[e.key] = true;
            if (e.key === ' ' && gameRunning && !hammerSwing) {
                e.preventDefault();
                hammerSwing = true; swingTimer = 14;
            }
            if (e.key.toLowerCase() === 'p' && gameRunning) togglePause();
        });
        window.addEventListener('keyup', e => keys[e.key] = false);
    </script>
</body>
</html>
