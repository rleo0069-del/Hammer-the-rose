<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hammer the Rose 🌹</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        body { margin:0; padding:0; background:#0a1f0a; display:flex; justify-content:center; align-items:center; min-height:100vh; font-family:'Press Start 2P',cursive; color:white; overflow:hidden; }
        #game-container { position:relative; box-shadow:0 0 50px #c00; }
        canvas { display:block; image-rendering:pixelated; background:#0a1f0a; }
        #ui { position:absolute; top:15px; left:20px; right:20px; display:flex; justify-content:space-between; z-index:10; pointer-events:none; }
        .score { font-size:22px; text-shadow:0 0 12px #ff1493; }
        #start-screen, #game-over-screen, #pause-screen { position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); display:flex; flex-direction:column; justify-content:center; align-items:center; z-index:100; }
        h1 { font-size:52px; color:#c00; text-shadow:0 0 30px #f66; margin:0; }
        button { padding:15px 50px; font-size:24px; background:#c00; color:white; border:4px solid #fff; cursor:pointer; margin:15px; }
        button:hover { background:#f66; transform:scale(1.1); }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="game" width="800" height="600"></canvas>
        
        <div id="ui">
            <div class="score" id="score-display">SCORE: 00000</div>
            <div class="score" id="combo-display"></div>
            <div class="score" id="level-display">LVL 1</div>
            <div class="score" id="lives-display">❤️❤️❤️</div>
        </div>

        <div id="start-screen">
            <h1>HAMMER THE ROSE</h1>
            <p style="font-size:32px; margin:10px;">🌹🔨🌹</p>
            <button id="start-btn">START GAME</button>
        </div>

        <div id="pause-screen" style="display:none;">
            <h1>PAUSED</h1>
            <button onclick="togglePause()">RESUME</button>
        </div>

        <div id="game-over-screen" style="display:none;">
            <h1>GAME OVER</h1>
            <p id="final-score" style="font-size:26px;"></p>
            <button id="restart-btn">PLAY AGAIN</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        
        let playerX = 360;
        let roses = [], thorns = [], particles = [];
        let score = 0, lives = 3, level = 1, combo = 0;
        let gameRunning = false, paused = false, hammerSwing = false, swingTimer = 0;
        let lastSpawn = 0, highScore = localStorage.getItem('htrHS') || 0;
        const keys = {};

        function playSquish() {
            try {
                const audio = new (window.AudioContext || window.webkitAudioContext)();
                const noise = audio.createBufferSource();
                const buffer = audio.createBuffer(1, audio.sampleRate * 0.35, audio.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < buffer.length; i++) data[i] = Math.random() * 2 - 1;
                noise.buffer = buffer;
                const filter = audio.createBiquadFilter();
                filter.type = 'lowpass'; filter.frequency.value = 450;
                noise.connect(filter).connect(audio.destination);
                noise.start();
            } catch(e) {}
        }

        function drawBackground() {
            // Sky
            const sky = ctx.createLinearGradient(0,0,0,380);
            sky.addColorStop(0, '#1a2a1a');
            sky.addColorStop(1, '#0f3a1f');
            ctx.fillStyle = sky;
            ctx.fillRect(0, 0, 800, 380);
            
            // Grass
            ctx.fillStyle = '#0a2a0a';
            ctx.fillRect(0, 380, 800, 220);
            
            // Grass blades
            ctx.strokeStyle = '#1a5a1a';
            ctx.lineWidth = 3.5;
            for (let i = 0; i < 800; i += 11) {
                ctx.beginPath();
                ctx.moveTo(i, 600);
                ctx.quadraticCurveTo(i + 7, 410, i + 16, 600);
                ctx.stroke();
            }
        }

        function drawPlayer() {
            // Handle
            ctx.fillStyle = '#4a2a0f';
            ctx.fillRect(playerX + 38, 405, 14, 145);
            
            // Club head
            ctx.fillStyle = '#444';
            ctx.fillRect(playerX + 15, 395, 70, 45);
            
            // Red spikes
            ctx.fillStyle = '#c00';
            ctx.fillRect(playerX + 20, 375, 9, 32);
            ctx.fillRect(playerX + 42, 368, 9, 35);
            ctx.fillRect(playerX + 65, 375, 9, 32);
            
            ctx.font = '62px Arial';
            ctx.fillText('🔨', playerX + 8, 475);
        }

        function spawnRose() { roses.push({x: Math.random()*720+40, y:-60, speed:4.8+level*0.5}); }
        function spawnThorn() { thorns.push({x: Math.random()*720+40, y:-60, speed:5.8+level*0.6}); }

        function createParticles(x, y, color, count) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x, y,
                    vx: (Math.random()-0.5)*12,
                    vy: (Math.random()-0.5)*10 - 4,
                    life: 38,
                    color,
                    size: Math.random()*8 + 4
                });
            }
        }

        function updateObjects() {
            // Roses
            for (let i = roses.length-1; i >= 0; i--) {
                roses[i
