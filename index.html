<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hammer the Rose 🌹</title>
    <link rel="icon" href="https://em-content.zobj.net/source/twitter/376/rose_1f339.png" type="image/png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        body { margin:0; padding:0; background:#0a1f0a; display:flex; justify-content:center; align-items:center; min-height:100vh; font-family:'Press Start 2P',cursive; color:white; overflow:hidden; }
        #game-container { position:relative; box-shadow:0 0 60px #900; }
        canvas { display:block; image-rendering:pixelated; }
        #ui { position:absolute; top:15px; left:20px; right:20px; display:flex; justify-content:space-between; z-index:10; pointer-events:none; }
        .score { font-size:22px; text-shadow:0 0 12px #ff1493; }
        #start-screen, #game-over-screen, #pause-screen { position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.93); display:flex; flex-direction:column; justify-content:center; align-items:center; z-index:100; text-align:center; }
        h1 { font-size:52px; color:#c00; text-shadow:0 0 30px #f66; }
        button { padding:16px 50px; font-size:24px; background:#c00; color:white; border:4px solid white; cursor:pointer; margin:10px; }
        button:hover { background:#f66; transform:scale(1.1); }
        .instructions { font-size:15px; line-height:1.6; max-width:580px; margin-top:20px; }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="game" width="800" height="600"></canvas>
        
        <div id="ui">
            <div class="score" id="score-display">SCORE: 00000</div>
            <div class="score" id="combo-display"></div>
            <div class="score" id="level-display">LVL 1</div>
            <div class="score" id="lives-display">❤️❤️❤️</div>
        </div>

        <div id="start-screen">
            <h1>HAMMER THE ROSE</h1>
            <p style="font-size:36px;margin:10px;">🌺🔨🌺</p>
            <button id="start-btn">START GAME</button>
            
            <div class="instructions">
                ← → or A D : Move Hammer<br>
                SPACE : Swing hammer & smash thorns!<br>
                Collect 🌺 roses • Avoid 🪡 thorns & 🐝 bees!<br><br>
                P = Pause • M = Music
            </div>
        </div>

        <div id="pause-screen" style="display:none;">
            <h1>PAUSED</h1>
            <button onclick="togglePause()">RESUME</button>
        </div>

        <div id="game-over-screen" style="display:none;">
            <h1>GAME OVER</h1>
            <p id="final-score" style="font-size:26px;margin:20px 0;"></p>
            <button id="restart-btn">PLAY AGAIN</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        
        let playerX = 360;
        let roses = [], thorns = [], bees = [], particles = [];
        let score = 0, lives = 3, level = 1, combo = 0;
        let gameRunning = false, paused = false, hammerSwing = false, swingTimer = 0;
        let lastSpawn = 0, musicOn = true, highScore = localStorage.getItem('htrHS') || 0;
        const keys = {};
        
        let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let musicOsc = null;

        function playSquish() {
            try {
                const n = audioCtx.createBufferSource();
                const b = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.45, audioCtx.sampleRate);
                const d = b.getChannelData(0);
                for (let i = 0; i < b.length; i++) d[i] = Math.random() * 2 - 1;
                n.buffer = b;
                const f = audioCtx.createBiquadFilter();
                f.type = 'lowpass'; f.frequency.value = 420;
                n.connect(f).connect(audioCtx.destination);
                n.start();
            } catch(e) {}
        }

        function toggleMusic() {
            musicOn = !musicOn;
            if (musicOn && gameRunning) startMusic();
            else if (musicOsc) { musicOsc.stop(); musicOsc = null; }
        }

        function startMusic() {
            if (musicOsc) musicOsc.stop();
            musicOsc = audioCtx.createOscillator();
            musicOsc.type = 'sawtooth';
            musicOsc.frequency.setValueAtTime(180, audioCtx.currentTime);
            const gain = audioCtx.createGain();
            gain.gain.value = 0.06;
            musicOsc.connect(gain).connect(audioCtx.destination);
            musicOsc.start();
        }

        function drawBackground() {
            const sky = ctx.createLinearGradient(0,0,0,380);
            sky.addColorStop(0, '#1a2a1a'); sky.addColorStop(1, '#0f3a20');
            ctx.fillStyle = sky; ctx.fillRect(0,0,800,380);
            ctx.fillStyle = '#0a2a0a'; ctx.fillRect(0,380,800,220);
            ctx.strokeStyle = '#1a5a1a'; ctx.lineWidth = 4;
            for (let i = 0; i < 800; i += 11) {
                ctx.beginPath();
                ctx.moveTo(i, 600);
                ctx.quadraticCurveTo(i + 8, 410, i + 17, 600);
                ctx.stroke();
            }
        }

        function drawPlayer() {
            ctx.fillStyle = '#3a1f0a'; ctx.fillRect(playerX + 37, 400, 16, 155);
            ctx.fillStyle = '#333'; ctx.fillRect(playerX + 10, 390, 78, 48);
            ctx.fillStyle = '#900';
            ctx.fillRect(playerX + 15, 370, 12, 35);
            ctx.fillRect(playerX + 35, 365, 10, 42);
            ctx.fillRect(playerX + 55, 370, 12, 35);
            ctx.fillRect(playerX + 72, 375, 9, 30);
            ctx.font = '65px Arial'; ctx.fillText('🔨', playerX + 5, 480);
        }

        function spawnRose() { roses.push({x: Math.random()*720+40, y:-60, speed:4.8+level*0.5}); }
        function spawnThorn() { thorns.push({x: Math.random()*720+40, y:-60, speed:5.8+level*0.6}); }
        function spawnBee() { 
            if (Math.random() < 0.14) bees.push({x: Math.random()*700+50, y: Math.random()*220+60, speed: 3.8 + level*0.4}); 
        }

        function createParticles(x, y, color, count) {
            for (let i = 0; i < count; i++) {
                particles.push({x, y, vx:(Math.random()-0.5)*13, vy:(Math.random()-0.5)*12-4, life:40, color, size:Math.random()*9+4});
            }
        }

        function updateObjects() {
            // Roses, Thorns, Bees, Particles logic (same as before)
            for (let i = roses.length-1; i >= 0; i--) {
                roses[i].y += roses[i].speed;
                if (roses[i].y > 410 && roses[i].x > playerX-40 && roses[i].x < playerX+130) {
                    score += 30 * (1 + Math.floor(combo/5));
                    combo++;
                    createParticles(roses[i].x+20, roses[i].y+20, '#ff1493', 25);
                    roses.splice(i,1);
                } else if (roses[i].y > 650) {
                    playSquish();
                    roses.splice(i,1);
                }
            }
