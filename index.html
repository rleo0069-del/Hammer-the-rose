<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hammer the Rose 🌹</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        body { margin:0; padding:0; background:#0f2a0f; display:flex; justify-content:center; align-items:center; min-height:100vh; font-family:'Press Start 2P',cursive; color:white; overflow:hidden; }
        #game-container { position:relative; box-shadow:0 0 50px #c00; }
        canvas { display:block; image-rendering:pixelated; }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="game" width="800" height="600"></canvas>
        
        <div id="ui" style="position:absolute;top:15px;left:20px;right:20px;display:flex;justify-content:space-between;z-index:10;pointer-events:none;">
            <div class="score" id="score-display">SCORE: 00000</div>
            <div class="score" id="combo-display"></div>
            <div class="score" id="level-display">LVL 1</div>
            <div class="score" id="lives-display">❤️❤️❤️</div>
        </div>

        <!-- Start, Pause, Game Over screens same as before -->
        <div id="start-screen" style="position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:100;">
            <h1 style="font-size:52px;color:#c00;text-shadow:0 0 30px #f66;">HAMMER THE ROSE</h1>
            <button id="start-btn" style="margin-top:20px;padding:15px 50px;font-size:24px;">START GAME</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        
        let playerX = 360;
        let roses = [], thorns = [], particles = [];
        let score = 0, lives = 3, level = 1, combo = 0;
        let gameRunning = false, hammerSwing = false, swingTimer = 0;
        let lastSpawn = 0;

        // New grass background
        function drawBackground() {
            // Sky
            ctx.fillStyle = '#1a3a2a';
            ctx.fillRect(0, 0, 800, 380);
            
            // Grass field
            ctx.fillStyle = '#0f3a0f';
            ctx.fillRect(0, 380, 800, 220);
            
            // Grass blades
            ctx.strokeStyle = '#1a5a1a';
            ctx.lineWidth = 4;
            for (let i = 0; i < 800; i += 12) {
                ctx.beginPath();
                ctx.moveTo(i, 600);
                ctx.quadraticCurveTo(i + 8, 400, i + 18, 600);
                ctx.stroke();
            }
        }

        // Better club-style hammer
        function drawPlayer() {
            // Wooden handle
            ctx.fillStyle = '#5c3311';
            ctx.fillRect(playerX + 38, 410, 14, 140);
            
            // Metal club head
            ctx.fillStyle = '#555';
            ctx.fillRect(playerX + 12, 395, 68, 42);
            
            // Spikes on club
            ctx.fillStyle = '#c00';
            ctx.fillRect(playerX + 18, 380, 8, 25);
            ctx.fillRect(playerX + 38, 370, 8, 30);
            ctx.fillRect(playerX + 65, 380, 8, 25);
            
            ctx.font = '62px Arial';
            ctx.fillText('🔨', playerX + 8, 475);
        }

        function spawnRose() { roses.push({x: Math.random()*720+40, y:-60, speed:4.8+level*0.5}); }
        function spawnThorn() { thorns.push({x: Math.random()*720+40, y:-60, speed:5.8+level*0.6}); }

        // Brown pin-like thorns
        function drawObjects() {
            ctx.font = '42px Arial';
            for (let r of roses) ctx.fillText('🌹', r.x, r.y + 38);   // Real rose emoji looks good

            ctx.font = '38px Arial';
            for (let t of thorns) {
                ctx.fillStyle = '#8B4513';   // Brown
                ctx.fillText('📍', t.x, t.y + 35);   // Pin-like
            }
        }

        // Squish sound when rose hits ground
        function playSquish() {
            const audio = new AudioContext();
            const noise = audio.createBufferSource();
            const buffer = audio.createBuffer(1, audio.sampleRate * 0.4, audio.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < buffer.length; i++) data[i] = Math.random() * 2 - 1;
            noise.buffer = buffer;
            const filter = audio.createBiquadFilter();
            filter.type = 'lowpass'; filter.frequency.value = 600;
            noise.connect(filter).connect(audio.destination);
            noise.start();
        }

        // Rest of the game logic (same as before, but with new squish)
        // ... (I'll keep it short here)

        // In updateObjects when rose falls off screen:
        // else if (roses[i].y > 650) {
        //     playSquish();
        //     roses.splice(i,1);
        // }

        console.log('🌹 Hammer the Rose - Next Level Ready!');
    </script>
</body>
</html>
