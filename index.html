<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hammer the Rose 🌹</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        body { margin:0; padding:0; background:linear-gradient(#2a1a2a,#1a0f1a); display:flex; justify-content:center; align-items:center; min-height:100vh; font-family:'Press Start 2P',cursive; color:white; overflow:hidden; }
        #game-container { position:relative; box-shadow:0 0 50px #ff1493; }
        canvas { display:block; image-rendering:pixelated; background:#0f0a1f; }
        #ui { position:absolute; top:15px; left:20px; right:20px; display:flex; justify-content:space-between; z-index:10; pointer-events:none; font-size:18px; }
        .score { text-shadow:0 0 10px #ff1493; }
        #start-screen, #game-over-screen, #pause-screen { position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.92); display:flex; flex-direction:column; justify-content:center; align-items:center; z-index:100; }
        h1 { font-size:54px; margin:0 0 10px 0; text-shadow:0 0 30px #ff1493; color:#ff69b4; }
        button { margin:15px; padding:14px 45px; font-family:'Press Start 2P',cursive; font-size:22px; background:#ff1493; color:white; border:4px solid white; cursor:pointer; box-shadow:0 0 25px #ff1493; }
        button:hover { transform:scale(1.08); background:#ff69b4; }
        .small { font-size:14px; margin-top:20px; }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="game" width="800" height="600"></canvas>
        
        <div id="ui">
            <div class="score" id="score-display">SCORE: 00000</div>
            <div class="score" id="combo-display"></div>
            <div class="score" id="level-display">LVL 1</div>
            <div class="score" id="lives-display">❤️❤️❤️</div>
        </div>

        <div id="start-screen">
            <h1>HAMMER THE ROSE</h1>
            <p style="font-size:36px; color:#ff69b4; margin:10px;">🌹🔨🌹</p>
            <button id="start-btn">START GAME</button>
            <div class="small">←→ / A D • SPACE (Swing) • P (Pause) • M (Music)</div>
        </div>

        <div id="pause-screen" style="display:none;">
            <h1>PAUSED</h1>
            <button onclick="togglePause()">RESUME</button>
        </div>

        <div id="game-over-screen" style="display:none;">
            <h1>GAME OVER</h1>
            <p id="final-score" style="font-size:26px; margin:15px;"></p>
            <button id="restart-btn">PLAY AGAIN</button>
            <button onclick="shareScore()">SHARE SCORE</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        
        let playerX = 360, playerWidth = 90;
        let roses = [], thorns = [], particles = [];
        let score = 0, lives = 3, level = 1, combo = 0, highScore = localStorage.getItem('htrHS') || 0;
        let gameRunning = false, paused = false, hammerSwing = false, swingTimer = 0;
        let lastSpawn = 0, musicOn = true;
        
        const keys = {};
        let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let musicOsc = null;

        function playSound(freq, duration, type='sine', vol=0.3) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type; osc.frequency.value = freq;
            gain.gain.value = vol;
            osc.connect(gain).connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        }

        function toggleMusic() {
            musicOn = !musicOn;
            if (musicOn && gameRunning) startMusic();
            else if (musicOsc) { musicOsc.stop(); musicOsc = null; }
        }

        function startMusic() {
            if (musicOsc) musicOsc.stop();
            musicOsc = audioCtx.createOscillator();
            musicOsc.type = 'triangle';
            musicOsc.frequency.setValueAtTime(220, audioCtx.currentTime);
            const gain = audioCtx.createGain();
            gain.gain.value = 0.08;
            musicOsc.connect(gain).connect(audioCtx.destination);
            musicOsc.start();
        }

        function drawBackground() {
            ctx.fillStyle = '#1a0f2a'; ctx.fillRect(0,400,800,200);
            ctx.fillStyle = '#2a1a3a'; ctx.fillRect(0,0,800,400);
            ctx.strokeStyle = '#ff69b4'; ctx.lineWidth = 2;
            for (let i = 50; i < 800; i += 80) {
                ctx.beginPath(); ctx.moveTo(i, 50); ctx.lineTo(i+30, 350); ctx.stroke();
            }
        }

        function drawPlayer() {
            ctx.fillStyle = '#8B4513'; ctx.fillRect(playerX+35,415,12,130);
            ctx.fillStyle = '#C0C0C0'; ctx.fillRect(playerX+8,405,75,38);
            ctx.fillStyle = '#228B22';
            if (hammerSwing) {
                ctx.fillRect(playerX+2,390,12,38); ctx.fillRect(playerX+78,390,12,38);
            } else {
                ctx.fillRect(playerX+15,400,8,25); ctx.fillRect(playerX+70,400,8,25);
            }
            ctx.font = '60px Arial'; ctx.fillText('🔨', playerX+4, 475);
        }

        function spawnRose() { roses.push({x:Math.random()*720+40, y:-60, speed:4.8+level*0.5}); }
        function spawnThorn() { thorns.push({x:Math.random()*720+40, y:-60, speed:5.8+level*0.6}); }

        function createParticles(x,y,color,count,big=false) {
            for(let i=0; i<count; i++) {
                particles.push({
                    x, y,
                    vx: (Math.random()-0.5)*(big?14:9),
                    vy: (Math.random()-0.5)*(big?12:8) - 5,
                    life: big?48:35,
                    color,
                    size: Math.random()*(big?10:6) + 4
                });
            }
        }

        function updateObjects() {
            // Roses
            for(let i=roses.length-1; i>=0; i--) {
                roses[i].y += roses[i].speed;
                if(roses[i].y > 410 && roses[i].x > playerX-45 && roses[i].x < playerX+playerWidth+45) {
                    const points = 25 * (1 + Math.floor(combo/4));
                    score += points; combo++;
                    playSound(900 + combo*40, 0.08, 'triangle', 0.5);
                    createParticles(roses[i].x+20, roses[i].y+20, '#ff1493', 24, true);
                    roses.splice(i,1);
                } else if(roses[i].y > 670) roses.splice(i,1);
            }
            // Thorns
            for(let i=thorns.length-1; i>=0; i--) {
                thorns[i].y += thorns[i].speed;
                const t = thorns[i];
                if(hammerSwing && t.y > 360 && t.x > playerX-45 && t.x < playerX+playerWidth+45) {
                    score += 60; combo++;
                    playSound(180, 0.25, 'sawtooth', 0.7);
                    createParticles(t.x+20, t.y+20, '#00ff88', 28, true);
                    thorns.splice(i,1);
                } else if(t.y > 410 && t.x > playerX-45 && t.x < playerX+playerWidth+45) {
                    lives--; combo = 0;
                    playSound(100, 0.5, 'square', 0.8);
                    createParticles(t.x+20, t.y+20, '#ff0000', 35);
                    thorns.splice(i,1);
                    if(lives <= 0) endGame();
                } else if(t.y > 670) thorns.splice(i,1);
            }
            // Particles
            for(let i=particles.length-1; i>=0; i--) {
                const p = particles[i];
                p.x += p.vx; p.y += p.vy; p.vy += 0.38; p.life--; p.size *= 0.95;
                if(p.life <= 0) particles.splice(i,1);
            }
        }

        function drawObjects() {
            ctx.font = '42px Arial';
            for(let r of roses) ctx.fillText('🌹', r.x, r.y + 38);
            ctx.font = '46px Arial';
            for(let t of thorns) ctx.fillText('🌵', t.x, t.y + 40);
            
            for(let p of particles) {
                ctx.globalAlpha = p.life / 45;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, p.size, p.size);
            }
            ctx.globalAlpha = 1;
        }

        function gameLoop() {
            if(!gameRunning || paused) return;
            
            ctx.clearRect(0,0,800,600);
            drawBackground();
            
            if(keys['ArrowLeft']||keys['a']) playerX -= 9.5;
            if(keys['ArrowRight']||keys['d']) playerX += 9.5;
            playerX = Math.max(10, Math.min(700, playerX));
            
            if(Date.now() - lastSpawn > Math.max(380, 850 - level*55)) {
                Math.random() < 0.58 ? spawnRose() : spawnThorn();
                lastSpawn = Date.now();
            }
            if(score > level * 850) level++;

            updateObjects();
            drawObjects();
            drawPlayer();

            if(hammerSwing){ swingTimer--; if(swingTimer<=0) hammerSwing=false; }

            document.getElementById('score-display').textContent = `SCORE: ${score.toString().padStart(5,'0')}`;
            document.getElementById('combo-display').textContent = combo > 5 ? `COMBO x${Math.floor(combo/5)}` : '';
            document.getElementById('level-display').textContent = `LVL ${level}`;
            document.getElementById('lives-display').innerHTML = '❤️'.repeat(lives);

            requestAnimationFrame(gameLoop);
        }

        function startGame() {
            document.getElementById('start-screen').style.display = 'none';
            gameRunning = true; paused = false;
            score=0; lives=3; level=1; combo=0;
            roses=[]; thorns=[]; particles=[];
            playerX=360; lastSpawn=Date.now();
            if(musicOn) startMusic();
            gameLoop();
        }

        function endGame() {
            gameRunning = false;
            if(musicOsc) { musicOsc.stop(); musicOsc = null; }
            if(score > highScore) {
                highScore = score;
                localStorage.setItem('htrHS', highScore);
            }
            document.getElementById('final-score').innerHTML = `
                FINAL SCORE: <span style="color:#ff69b4">${score}</span><br>
                HIGH SCORE: <span style="color:#ffd700">${highScore}</span>
            `;
            document.getElementById('game-over-screen').style.display = 'flex';
        }

        function togglePause() {
            paused = !paused;
            document.getElementById('pause-screen').style.display = paused ? 'flex' : 'none';
            if(!paused && gameRunning) gameLoop();
        }

        function shareScore() {
            const text = `I scored ${score} in Hammer the Rose! 🌹🔨 Can you beat me?`;
            if(navigator.share) {
                navigator.share({ title: 'Hammer the Rose', text: text, url: window.location.href });
            } else {
                navigator.clipboard.writeText(text + "\n" + window.location.href);
                alert("Score copied to clipboard!");
            }
        }

        // Controls
        document.getElementById('start-btn').addEventListener('click', startGame);
        document.getElementById('restart-btn').addEventListener('click', () => {
            document.getElementById('game-over-screen').style.display = 'none';
            startGame();
        });

        window.addEventListener('keydown', e => {
            keys[e.key] = true;
            if(e.key === ' ' && gameRunning && !hammerSwing) { e.preventDefault(); hammerSwing=true; swingTimer=14; playSound(650,0.1); }
            if(e.key.toLowerCase() === 'p') togglePause();
            if(e.key.toLowerCase() === 'm') toggleMusic();
        });
        window.addEventListener('keyup', e => keys[e.key] = false);

        // Mobile Touch
        let touchX = 0;
        canvas.addEventListener('touchstart', e => {
            if(!gameRunning) return;
            touchX = e.changedTouches[0].screenX;
            if(!hammerSwing) { hammerSwing = true; swingTimer = 14; }
        });
        canvas.addEventListener('touchmove', e => {
            if(!gameRunning) return;
            const newX = e.changedTouches[0].screenX;
            playerX += (newX - touchX) * 0.9;
            touchX = newX;
            playerX = Math.max(10, Math.min(700, playerX));
        });

        console.log('%c🌹 Hammer the Rose - FULLY UPGRADED 🌹', 'color:#ff69b4;font-size:20px');
    </script>
</body>
</html>
