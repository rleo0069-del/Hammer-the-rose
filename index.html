<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hammer the Rose 🌹</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        body { margin:0; padding:0; background:linear-gradient(#2a1a2a,#1a0f1a); display:flex; justify-content:center; align-items:center; min-height:100vh; font-family:'Press Start 2P',cursive; color:white; overflow:hidden; }
        #game-container { position:relative; box-shadow:0 0 40px #ff1493; }
        canvas { display:block; image-rendering:pixelated; background:#0f0a1f; }
        #ui { position:absolute; top:15px; left:20px; right:20px; display:flex; justify-content:space-between; z-index:10; pointer-events:none; }
        .score { font-size:22px; text-shadow:0 0 10px #ff1493; }
        #start-screen, #game-over-screen, #pause-screen { position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); display:flex; flex-direction:column; justify-content:center; align-items:center; z-index:100; }
        h1 { font-size:52px; margin:0 0 15px 0; text-shadow:0 0 25px #ff1493; color:#ff69b4; }
        button { margin-top:25px; padding:15px 50px; font-family:'Press Start 2P',cursive; font-size:24px; background:#ff1493; color:white; border:4px solid white; cursor:pointer; box-shadow:0 0 25px #ff1493; }
        button:hover { transform:scale(1.1); background:#ff69b4; }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="game" width="800" height="600"></canvas>
        <div id="ui">
            <div class="score" id="score-display">SCORE: 00000</div>
            <div class="score" id="level-display">LEVEL 1</div>
            <div class="score" id="lives-display">❤️❤️❤️</div>
        </div>
        
        <div id="start-screen">
            <h1>HAMMER THE ROSE</h1>
            <p style="font-size:32px;color:#ff69b4;">🌹🔨🌹</p>
            <button id="start-btn">START GAME</button>
            <div style="margin-top:30px;font-size:16px;text-align:center;">
                ← → or A D : Move<br>
                SPACE : Swing Hammer<br>
                P : Pause
            </div>
        </div>
        
        <div id="pause-screen" style="display:none;">
            <h1>PAUSED</h1>
            <button onclick="togglePause()">RESUME</button>
        </div>
        
        <div id="game-over-screen" style="display:none;">
            <h1>GAME OVER</h1>
            <p id="final-score" style="font-size:28px;"></p>
            <button id="restart-btn">PLAY AGAIN</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        
        let playerX = 360, playerWidth = 90;
        let roses = [], thorns = [], particles = [];
        let score = 0, lives = 3, level = 1, combo = 0;
        let gameRunning = false, paused = false, hammerSwing = false, swingTimer = 0;
        let lastSpawn = 0, highScore = localStorage.getItem('hammerRoseHS') || 0;
        const keys = {};
        
        function playSound(freq, duration) {
            const audio = new AudioContext();
            const osc = audio.createOscillator();
            osc.frequency.value = freq;
            osc.connect(audio.destination);
            osc.start(); osc.stop(audio.currentTime + duration);
        }
        
        function drawBackground() {
            ctx.fillStyle = '#1a0f2a'; ctx.fillRect(0,400,800,200);
            ctx.fillStyle = '#2a1a3a'; ctx.fillRect(0,0,800,400);
        }
        
        function drawPlayer() {
            ctx.fillStyle = '#8B4513'; ctx.fillRect(playerX+35,415,12,130);
            ctx.fillStyle = '#C0C0C0'; ctx.fillRect(playerX+8,405,75,38);
            ctx.fillStyle = '#228B22';
            if (hammerSwing) {
                ctx.fillRect(playerX+2,395,10,30);
                ctx.fillRect(playerX+80,395,10,30);
            } else {
                ctx.fillRect(playerX+15,400,8,25);
                ctx.fillRect(playerX+70,400,8,25);
            }
            ctx.font = '58px Arial'; ctx.fillText('🔨', playerX+5,470);
        }
        
        function spawnRose() { roses.push({x:Math.random()*730+30, y:-50, speed:4.5+level*0.4}); }
        function spawnThorn() { thorns.push({x:Math.random()*730+30, y:-50, speed:5.5+level*0.5}); }
        
        function createParticles(x,y,color,count) {
            for(let i=0;i<count;i++){
                particles.push({x,y, vx:(Math.random()-0.5)*10, vy:(Math.random()-0.5)*10-4, life:35, color, size:Math.random()*7+4});
            }
        }
        
        function updateObjects() {
            for(let i=roses.length-1;i>=0;i--){
                roses[i].y += roses[i].speed;
                if(roses[i].y>410 && roses[i].x>playerX-40 && roses[i].x<playerX+playerWidth+40){
                    score += 25*(1+Math.floor(combo/5)); combo++;
                    playSound(800+combo*30,0.1);
                    createParticles(roses[i].x+20,roses[i].y+20,'#ff69b4',18);
                    roses.splice(i,1);
                } else if(roses[i].y>650) roses.splice(i,1);
            }
            for(let i=thorns.length-1;i>=0;i--){
                thorns[i].y += thorns[i].speed;
                const t=thorns[i];
                if(hammerSwing && t.y>370 && t.x>playerX-40 && t.x<playerX+playerWidth+40){
                    score+=50; combo++;
                    playSound(250,0.2);
                    createParticles(t.x+20,t.y+20,'#00ff88',22);
                    thorns.splice(i,1);
                } else if(t.y>410 && t.x>playerX-40 && t.x<playerX+playerWidth+40){
                    lives--; combo=0;
                    playSound(120,0.4);
                    createParticles(t.x+20,t.y+20,'#ff0000',25);
                    thorns.splice(i,1);
                    if(lives<=0) endGame();
                } else if(t.y>650) thorns.splice(i,1);
            }
            for(let i=particles.length-1;i>=0;i--){
                const p=particles[i];
                p.x+=p.vx; p.y+=p.vy; p.vy+=0.35; p.life--; p.size*=0.96;
                if(p.life<=0) particles.splice(i,1);
            }
        }
        
        function drawObjects() {
            ctx.font='40px Arial';
            for(let r of roses) ctx.fillText('🌹',r.x,r.y+35);
            ctx.font='44px Arial';
            for(let t of thorns) ctx.fillText('🌵',t.x,t.y+38);
            for(let p of particles){
                ctx.globalAlpha = p.life/40;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x,p.y,p.size,p.size);
            }
            ctx.globalAlpha=1;
        }
        
        function gameLoop(){
            if(!gameRunning || paused) return;
            ctx.clearRect(0,0,800,600);
            drawBackground();
            
            if(keys['ArrowLeft']||keys['a']) playerX-=9;
            if(keys['ArrowRight']||keys['d']) playerX+=9;
            playerX = Math.max(10, Math.min(700, playerX));
            
            if(Date.now()-lastSpawn > 600){
                Math.random()<0.6 ? spawnRose() : spawnThorn();
                lastSpawn = Date.now();
            }
            if(score > level*800) level++;
            
            updateObjects();
            drawObjects();
            drawPlayer();
            
            if(hammerSwing){ swingTimer--; if(swingTimer<=0) hammerSwing=false; }
            
            document.getElementById('score-display').textContent = `SCORE: ${score.toString().padStart(5,'0')}`;
            document.getElementById('level-display').textContent = `LEVEL ${level}`;
            document.getElementById('lives-display').innerHTML = '❤️'.repeat(lives);
            
            requestAnimationFrame(gameLoop);
        }
        
        function startGame(){
            document.getElementById('start-screen').style.display='none';
            gameRunning=true; paused=false;
            score=0; lives=3; level=1; combo=0;
            roses=[]; thorns=[]; particles=[];
            playerX=360; lastSpawn=Date.now();
            gameLoop();
        }
        
        function endGame(){
            gameRunning=false;
            if(score>highScore){ highScore=score; localStorage.setItem('hammerRoseHS',highScore); }
            document.getElementById('final-score').innerHTML = `FINAL SCORE: <span style="color:#ff69b4">${score}</span><br>HIGH: <span style="color:#ffd700">${highScore}</span>`;
            document.getElementById('game-over-screen').style.display='flex';
        }
        
        function togglePause(){
            paused = !paused;
            document.getElementById('pause-screen').style.display = paused ? 'flex' : 'none';
            if(!paused) gameLoop();
        }
        
        document.getElementById('start-btn').addEventListener('click', startGame);
        document.getElementById('restart-btn').addEventListener('click', ()=>{ document.getElementById('game-over-screen').style.display='none'; startGame(); });
        
        window.addEventListener('keydown', e=>{
            keys[e.key]=true;
            if(e.key===' ' && gameRunning && !hammerSwing){ e.preventDefault(); hammerSwing=true; swingTimer=14; }
            if(e.key.toLowerCase()==='p' && gameRunning) togglePause();
        });
        window.addEventListener('keyup', e=> keys[e.key]=false);
    </script>
</body>
</html>
